<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptops</title>
    
    <!-- Metadatos Enriquecidos: Open Graph -->
    <meta property="og:title" content="Asus ROG">
    <meta property="og:description" content="Descripción.">
    <meta property="og:image" content="">
    <meta property="og:url" content="https://ejercicio3.com/producto">
    <meta property="og:type" content="product">

    <!-- Metadatos Enriquecidos: Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">

    <meta name="twitter:description" content="Descripción detallada del producto.">
    <meta name="twitter:image" content="URL-de-la-imagen-destacada.jpg">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .product-container {
            max-width: 800px;
            margin: auto;
        }
        .product-image {
            max-width: 100%;
            height: auto;
        }
        .product-details {
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="product-container">
        <h1>Nombre del Producto</h1>
        <img src="URL-de-la-imagen-del-producto.jpg" alt="" class="product-image">
        <div class="product-details">
            <h2>Descripción del Producto</h2>
            <p>Características y beneficios.</p>

            <h2>Especificaciones Técnicas</h2>
            <table>
                <tr>
                    <th>Especificación</th>
                    <th></th>
                </tr>
                <tr>
                    <td>Marca</td>
                    <td></td>
                </tr>
                <tr>
                    <td>Modelo</td>
                    <td></td>
                </tr>
                <tr>
                    <td>Dimensiones</td>
                    <td></td>
                </tr>
                <tr>
                    <td>Peso</td>
                    <td></td>
                </tr>
                <tr>
                    <td>Material</td>
                    <td></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
